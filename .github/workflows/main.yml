name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy
        run: |
          cd ~/docker/jobless
          # Already pulled by checkout, now run your commands:
          docker compose down
          docker compose up -d --build
      - name: Restart
        run: |
          docker compose -f ~/docker/traefik/docker-compose.yml restart traefik
